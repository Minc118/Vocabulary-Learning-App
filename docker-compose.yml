services:
  backend:
    build:
      context: ./backend
    ports:
      - "5001:5001"
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5001
      FLASK_DEBUG: "true"

  frontend:
    build:
      context: .
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://backend:5001
    depends_on:
      - backend
