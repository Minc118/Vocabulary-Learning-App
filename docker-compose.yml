services:
  backend:
    build:
      context: ./backend
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
    env_file:
      - ./frontend/.env.local
    environment:
      FLASK_HOST: "0.0.0.0"
      FLASK_PORT: "5001"
      PORT: "5001"
      FLASK_DEBUG: "true"
      FRONTEND_ORIGIN: "http://localhost:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5001
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
